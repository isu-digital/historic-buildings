{%- assign fields = site.data.config-search -%}
{%- assign index_fields = fields | where: 'index','true' -%}
<style>
.search-highlight {
  background-color: #fff3a3;
  color: inherit;
  padding: 0 0.08em;
}

a .search-highlight {
  color: inherit;
  text-decoration: inherit;
}
</style>
<script src="{{ '/assets/lib/lunr.min.js' | relative_url }}"></script>
<script src="{{ '/assets/js/lunr-store.js' | relative_url }}"></script>
<script>
function escapeHtml(text) {
  return String(text).replace(/[&<>"']/g, function (char) {
    return {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[char];
  });
}

function escapeRegExp(text) {
  return text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function getHighlightTerms(query) {
  return query
    .split(/\s+/)
    .map(function (term) {
      return term
        .replace(/^[^:]+:/, '')
        .replace(/[~^]\d+$/g, '')
        .replace(/^\*+|\*+$/g, '')
        .replace(/[()+\-!]/g, '')
        .trim();
    })
    .filter(function (term, index, terms) {
      return term && terms.indexOf(term) === index;
    })
    .sort(function (a, b) {
      return b.length - a.length;
    });
}

function highlightText(text, terms) {
  var safeText = escapeHtml(text || '');
  if (!terms.length) {
    return safeText;
  }

  var pattern = terms.map(function (term) {
    return escapeRegExp(term);
  }).join('|');

  if (!pattern) {
    return safeText;
  }

  return safeText.replace(new RegExp('(' + pattern + ')', 'gi'), '<mark class="search-highlight">$1</mark>');
}

/* initialize lunr */
var idx = lunr(function () {
  /* add index fields from config */
  this.ref('id')
  {% for f in index_fields %}
  this.field({{ f.field | jsonify }})
  {% endfor %}

  //this.pipeline.remove(lunr.trimmer)

  for (var item in store) {
    this.add({
      {% for f in index_fields %}
      {{ f.field | jsonify }}: store[item][{{ f.field | jsonify }}],
      {% endfor %}
      id: item
    })
  }

});

/* search function */
function lunr_search () {
  var resultdiv = document.querySelector('#lunrResults');
  var query = document.querySelector('#lunrSearchBox').value;//.toLowerCase();
  var highlightTerms = getHighlightTerms(query);
  /* basic search that supports operators */
  var result = idx.search(query); 
  /* more fuzzy search, but doesn't support operators:
  var result =
    idx.query(function (q) {
      query.split(lunr.tokenizer.separator).forEach(function (term) {
        q.term(term, { boost: 100 })
        if(query.lastIndexOf(" ") != query.length-1){
          q.term(term, {  usePipeline: false, wildcard: lunr.Query.wildcard.TRAILING, boost: 10 })
        }
        if (term != ""){
          q.term(term, {  usePipeline: false, editDistance: 1, boost: 1 })
        }
      })
    });*/
  resultdiv.innerHTML = "";
  var newresults = '<tr><td><h4 class="mt-3">' + result.length + ' Result(s) found</h4></td></tr>';
  for (var item in result) {
    var ref = result[item].ref;
    var objectId = store[ref].objectid || '';
    var buildingProfileLabel = objectId.toLowerCase().indexOf('building') !== -1 ? 'Building Profile: ' : '';
    var hasCornerstonesThumb = objectId.toLowerCase().indexOf('cornerstones') !== -1 && store[ref].image_thumb;
    var thumbnail = '';
    var titleText = highlightText(store[ref][{{ fields[0].field | jsonify }}] || '', highlightTerms);
    if (hasCornerstonesThumb) {
      thumbnail =
        '<div class="mb-3 mb-md-0 me-md-3 flex-shrink-0">' +
          '<img class="img-thumbnail d-block mx-auto mx-md-0" src="' + store[ref].image_thumb + '" alt="' + (store[ref].image_alt_text || store[ref].title || '') + '" style="width: 120px; max-width: 100%; height: auto;">' +
        '</div>';
    }
    var searchitem =
      '<tr>'+
          '<td>' +
            '<div class="d-flex flex-column flex-md-row align-items-start">' +
            thumbnail +
            '<div class="flex-grow-1 w-100">' +
            {% assign display = fields | where: 'display','true' %}
            {% for d in display %}
            {% if forloop.first %}
            '<p class="h4">' + buildingProfileLabel + '<a href="{{ site.baseurl }}/items/' + store[ref].id + '">' + titleText  + '</a></p>' +
            '<p class="ms-3">';
              {% else %}
              if(store[ref][{{ d.field | jsonify }}]) {
                searchitem += highlightText(store[ref][{{ d.field | jsonify }}], highlightTerms) + '<br> '; }
              {% endif %}{% endfor %}
              searchitem += '</p></div></div></td>' +
      '</tr>';
    newresults += searchitem;
  }
  resultdiv.innerHTML = newresults;
}

/* init search box and get query string */
if (window.location.search) {
  var queryString = decodeURIComponent(window.location.search.substring(1).split("=")[1]);
  document.querySelector('#lunrSearchBox').value = queryString;
  lunr_search();
}
</script>
